<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LoudWake</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: radial-gradient(120% 80% at 70% 30%, #1c0c06 0%, #0a0a0c 60%);
    color: #f5f5f7; text-align: center;
    font: 17px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .card { padding: 40px 28px; }
  h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .accent { color: #ff6b35; }
  p { color: #c9c9ce; max-width: 420px; }
  a { color: #ff6b35; }
</style>
</head>
<body>
  <div class="card">
    <h1>Loud<span class="accent">Wake</span></h1>
    <p>An alarm you can't sleep through. No snooze, hard to silence, and it won't stop
    until you solve a puzzle.</p>
    <p>
      <a href="https://github.com/shivsak/loud-wake">GitHub</a> ·
      <a href="./privacy/">Privacy Policy</a>
    </p>
  </div>
</body>
</html>
